<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>捂着门牙说历史·唐朝超级英雄团！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  :root {
    --gold: #FFD700;
    --red: #FF4757;
    --blue: #5352ED;
    --green: #2ED573;
    --purple: #A29BFE;
    --orange: #FFA502;
    --pink: #FF6B9D;
    --teal: #00CEC9;
    --bg: #FFF9E6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    overflow-x: hidden;
  }

  /* ===== HERO SCREEN ===== */
  #hero-screen {
    min-height: 100vh;
    background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 50%, #4ECDC4 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .star-bg {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star-bg::before, .star-bg::after {
    content: '⭐';
    position: absolute;
    font-size: 3rem;
    animation: float 6s ease-in-out infinite;
  }
  .star-bg::before { top: 10%; left: 5%; animation-delay: 0s; }
  .star-bg::after { top: 20%; right: 8%; animation-delay: 3s; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(15deg); }
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
    50% { box-shadow: 0 0 50px rgba(255,215,0,1), 0 0 80px rgba(255,100,0,0.5); }
  }
  @keyframes slide-in-left {
    from { transform: translateX(-80px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slide-in-right {
    from { transform: translateX(80px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes pop-in {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    70% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }
  @keyframes rainbow {
    0% { color: #FF4757; }
    16% { color: #FFA502; }
    33% { color: #FFD700; }
    50% { color: #2ED573; }
    66% { color: #1E90FF; }
    83% { color: #A29BFE; }
    100% { color: #FF4757; }
  }

  .hero-title {
    font-size: clamp(2.2rem, 7vw, 5rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 4px 4px 0 #c0392b, 6px 6px 0 rgba(0,0,0,0.15);
    line-height: 1.2;
    animation: pop-in 0.8s ease forwards;
    margin-bottom: 0.5rem;
  }
  .hero-subtitle {
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    animation: pop-in 0.8s ease 0.3s both forwards;
    margin-bottom: 2rem;
  }
  .hero-emoji-row {
    font-size: 3rem;
    animation: bounce 2s ease-in-out infinite;
    margin-bottom: 2rem;
  }
  .start-btn {
    background: linear-gradient(135deg, #FF4757, #FF6B9D);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px 50px;
    font-size: 1.5rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(255,71,87,0.4), 0 4px 0 #c0392b;
    transition: transform 0.1s, box-shadow 0.1s;
    animation: pulse-glow 2s ease-in-out infinite;
    letter-spacing: 2px;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,71,87,0.5), 0 4px 0 #c0392b; }
  .start-btn:active { transform: translateY(2px); box-shadow: 0 4px 15px rgba(255,71,87,0.4), 0 2px 0 #c0392b; }

  .floating-icons {
    position: absolute;
    width: 100%; height: 100%;
    pointer-events: none;
    top: 0; left: 0;
  }
  .fi {
    position: absolute;
    font-size: 2.5rem;
    animation: float 4s ease-in-out infinite;
  }

  /* ===== MAIN APP ===== */
  #app { display: none; }

  .app-header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: #fff;
    padding: 20px 30px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .app-header h1 {
    font-size: clamp(1.3rem, 4vw, 2rem);
    font-weight: 900;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .progress-bar-wrap {
    background: rgba(255,255,255,0.3);
    border-radius: 50px;
    height: 10px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #FFD700, #FFA502);
    border-radius: 50px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text { font-size: 0.85rem; margin-top: 4px; opacity: 0.9; }

  /* ===== CHARACTER GRID ===== */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .char-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px 15px;
    text-align: center;
    cursor: pointer;
    border: 3px solid #eee;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    animation: pop-in 0.5s ease both;
  }
  .char-card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  }
  .char-card.unlocked { border-color: var(--gold); }
  .char-card.locked { filter: grayscale(0.6) opacity(0.7); cursor: not-allowed; }
  .char-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .char-card:hover::before { opacity: 1; }

  .char-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    margin: 0 auto 12px;
    border: 4px solid #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    animation: bounce 2.5s ease-in-out infinite;
  }
  .char-name {
    font-size: 1.1rem;
    font-weight: 900;
    color: #2d3436;
    margin-bottom: 4px;
  }
  .char-title {
    font-size: 0.75rem;
    color: #636e72;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 50px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .char-stars {
    color: #FFD700;
    font-size: 1rem;
  }
  .lock-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: rgba(255,255,255,0.5);
  }

  /* ===== DETAIL MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: #fff;
    border-radius: 30px;
    max-width: 620px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    transform: scale(0.7);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
  }
  .modal-overlay.active .modal-box { transform: scale(1); }

  .modal-header {
    padding: 30px 30px 20px;
    text-align: center;
    border-radius: 30px 30px 0 0;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 15px; right: 20px;
    background: rgba(255,255,255,0.3);
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    color: #fff;
    font-weight: bold;
    transition: transform 0.2s, background 0.2s;
  }
  .modal-close:hover { transform: rotate(90deg) scale(1.1); background: rgba(255,255,255,0.5); }

  .modal-avatar {
    width: 110px; height: 110px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 4.5rem;
    margin: 0 auto 15px;
    border: 5px solid rgba(255,255,255,0.6);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    animation: bounce 2s ease-in-out infinite;
  }
  .modal-name {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .modal-slogan {
    font-size: 1rem;
    color: rgba(255,255,255,0.9);
    margin-top: 6px;
    font-style: italic;
  }

  .modal-body { padding: 25px 30px 30px; }

  .info-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .tag {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 5px 14px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .tag.red { background: linear-gradient(135deg, #FF4757, #c0392b); }
  .tag.green { background: linear-gradient(135deg, #2ED573, #27ae60); }
  .tag.orange { background: linear-gradient(135deg, #FFA502, #e67e22); }
  .tag.teal { background: linear-gradient(135deg, #00CEC9, #0984e3); }
  .tag.pink { background: linear-gradient(135deg, #FF6B9D, #e84393); }

  .story-section {
    background: linear-gradient(135deg, #f8f9fa, #e9ecef);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .story-title {
    font-size: 1rem;
    font-weight: 900;
    color: #2d3436;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .story-text {
    font-size: 0.95rem;
    color: #444;
    line-height: 1.8;
  }
  .story-text strong { color: #e74c3c; }

  .fun-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .fact-card {
    background: #fff;
    border: 2px solid #f0f0f0;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: transform 0.2s;
  }
  .fact-card:hover { transform: scale(1.03); }
  .fact-icon { font-size: 1.8rem; margin-bottom: 5px; }
  .fact-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .fact-value { font-size: 0.9rem; font-weight: 700; color: #2d3436; margin-top: 2px; }

  .superpower-box {
    background: linear-gradient(135deg, #FFD700, #FFA502);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 20px;
    text-align: center;
  }
  .superpower-title { font-size: 0.85rem; font-weight: 700; color: rgba(0,0,0,0.6); margin-bottom: 8px; }
  .superpower-name { font-size: 1.2rem; font-weight: 900; color: #fff; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }

  .quote-box {
    background: #2d3436;
    color: #fff;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .quote-box::before {
    content: '"';
    font-size: 5rem;
    color: rgba(255,255,255,0.1);
    position: absolute;
    top: -10px; left: 15px;
    line-height: 1;
    font-family: serif;
  }
  .quote-text {
    font-size: 1rem;
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }
  .quote-source { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 8px; text-align: right; }

  .know-btn {
    width: 100%;
    background: linear-gradient(135deg, #FF4757, #c0392b);
    color: #fff;
    border: none;
    border-radius: 15px;
    padding: 15px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 5px 0 #922b21;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  .know-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #922b21; }
  .know-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #922b21; }

  /* ===== CELEBRATION ===== */
  .confetti-wrap {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 12px; height: 12px;
    top: -20px;
    border-radius: 2px;
    animation: confetti-fall 2.5s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    background: linear-gradient(135deg, #2d3436, #636e72);
    color: #fff;
    padding: 20px 30px;
    text-align: center;
    margin-top: 20px;
  }
  .bottom-bar p { font-size: 0.85rem; opacity: 0.7; }
  .achievement-bar {
    background: #fff;
    padding: 15px 30px;
    text-align: center;
    border-top: 3px solid #FFD700;
  }
  .achievement-title { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
  .achievement-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .badge {
    background: linear-gradient(135deg, #FFD700, #FFA502);
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 700;
    opacity: 0.3;
    transition: opacity 0.5s, transform 0.3s;
  }
  .badge.earned { opacity: 1; animation: pop-in 0.4s ease; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .char-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
    .fun-facts { grid-template-columns: 1fr 1fr; }
    .modal-body { padding: 20px; }
  }

  .section-label {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 900;
    color: #2d3436;
    padding: 20px 30px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 3px;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
  }
</style>
</head>
<body>

<!-- ===== HERO SCREEN ===== -->

  <div class="floating-icons">
    <span class="fi" style="top:8%;left:10%;animation-delay:0s">👑</span>
    <span class="fi" style="top:15%;right:12%;animation-delay:1s">⚔️</span>

    <button class="start-btn" onclick="startApp()">🚀 出发啦！</button>

</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div class="app-header">
    <h1>🏯 捂着门牙说历史 · 唐朝英雄团 🏯</h1>
    <div class="progress-bar-wrap">

</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header" id="modalHeader">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-avatar" id="modalAvatar"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-slogan" id="modalSlogan"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>

</div>

<!-- ===== CONFETTI ===== -->
<div class="confetti-wrap" id="confettiWrap"></div>

<script>
const CHARACTERS = [
  {
    id: 1,
    name: "李渊",
    emoji: "🧔",
    title: "唐朝创始人",
    color: ["#c0392b","#e74c3c"],
    slogan: "我在乱世中建立了大唐！",
    stars: 4,
    tags: [{t:"开国皇帝",c:"red"},{t:"政治家",c:"orange"},{t:"草根逆袭",c:"green"}],
    facts: [
      {icon:"📅",label:"在位时间",value:"618 - 626年"},
      {icon:"🏠",label:"都城",value:"长安"},
      {icon:"👑",label:"庙号",value:"唐高祖"},
      {icon:"⚡",label:"绝技",value:"乱世建国"}
    ],
    story: `你知道李渊是怎么建立唐朝的吗？他原本是隋朝的一个地方官，看着天下大乱、各地起义，觉得<strong>是时候出手了</strong>！他带着儿子李世民，从太原起兵，一路打到了长安。618年，李渊正式称帝，大唐开国！<br><br>不过，他后来被自己厉害的儿子李世民"请"到了退休生活，这就是历史上著名的<strong>玄武门之变</strong>。虽然有点伤心，但李渊爷爷创立唐朝的功劳可不能忘！`,
    superpower: "🌊 乱世造浪 · 建国开基",
    quote: "好风凭借力，送我上青云。——大唐王朝从这里起航！",
    quoteSource: "历史评语"
  },
  {
    id: 2,
    name: "李世民",
    emoji: "⚔️",
    title: "千古明君",
    color: ["#2c3e50","#3498db"],
    slogan: "贞观之治，朕说了算！",
    stars: 5,
    tags: [{t:"唐太宗",c:"red"},{t:"军事天才",c:"orange"},{t:"明君代表",c:"teal"},{t:"书法家",c:"green"}],
    facts: [
      {icon:"📅",label:"在位时间",value:"626 - 649年"},
      {icon:"🏆",label:"盛世名称",value:"贞观之治"},
      {icon:"📖",label:"年号",value:"贞观"},

let unlockedCount = 0;

function startApp() {
  document.getElementById('hero-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.style.animationDelay = (i * 0.07) + 's';
    card.innerHTML = `
      <div class="char-avatar" style="background:linear-gradient(135deg,${c.color[0]},${c.color[1]})">
        ${c.emoji}
      </div>
      <div class="char-name">${c.name}</div>
      <div class="char-title">${c.title}</div>
      <div class="char-stars">${'⭐'.repeat(c.stars)}</div>
    `;
    card.onclick = () => openModal(c, card);
    grid.appendChild(card);
  });
}

function openModal(c, cardEl) {
  // Mark unlocked
  if (!cardEl.classList.contains('unlocked')) {
    cardEl.classList.add('unlocked');
    unlockedCount++;
    updateProgress();
    setTimeout(() => triggerConfetti(), 200);
    checkAchievements();
  }

  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const avatar = document.getElementById('modalAvatar');
  const name = document.getElementById('modalName');
  const slogan = document.getElementById('modalSlogan');
  const body = document.getElementById('modalBody');

  header.style.background = `linear-gradient(135deg,${c.color[0]},${c.color[1]})`;
  avatar.textContent = c.emoji;
  avatar.style.background = `linear-gradient(135deg,${c.color[1]},${c.color[0]})`;
  name.textContent = c.name;
  slogan.textContent = c.slogan;

  const tagsHTML = c.tags.map(t => `<span class="tag ${t.c}">${t.t}</span>`).join('');
  const factsHTML = c.facts.map(f => `
    <div class="fact-card">
      <div class="fact-icon">${f.icon}</div>
      <div class="fact-label">${f.label}</div>
      <div class="fact-value">${f.value}</div>
    </div>
  `).join('');

  body.innerHTML = `
    <div class="info-tags">${tagsHTML}</div>
    <div class="fun-facts">${factsHTML}</div>
    <div class="story-section">
      <div class="story-title">📖 超趣故事时间</div>
      <div class="story-text">${c.story}</div>
    </div>
    <div class="superpower-box">
      <div class="superpower-title">🦸 专属必杀技</div>
      <div class="superpower-name">${c.superpower}</div>
    </div>
    <div class="quote-box">
      <div class="quote-text">${c.quote}</div>
      <div class="quote-source">${c.quoteSource}</div>
    </div>
    <button class="know-btn" onclick="closeModalDirect()">✅ 我认识他/她了！下一个！</button>
  `;

  overlay.classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModalDirect();
  }
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function updateProgress() {
  const pct = (unlockedCount / CHARACTERS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `已解锁 ${unlockedCount} / ${CHARACTERS.length} 位英雄`;
}

function checkAchievements() {
  const thresholds = {1:'badge-1', 3:'badge-3', 5:'badge-5', 8:'badge-8', 10:'badge-10'};
  if (thresholds[unlockedCount]) {
    const el = document.getElementById(thresholds[unlockedCount]);
    if (el) el.classList.add('earned');
  }
}

function triggerConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#FF4757','#FFD700','#2ED573','#5352ED','#FF6B9D','#FFA502'];
  const shapes = ['■','▲','●','◆','★'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.width = (8 + Math.random() * 12) + 'px';
    piece.style.height = (8 + Math.random() * 12) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}
